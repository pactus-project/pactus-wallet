name: Building Web Wallet

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  building:
    runs-on: ubuntu-latest

    steps:
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci

      - name: Building the Project
        run: npm run build
